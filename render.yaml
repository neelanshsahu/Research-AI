services:
  # ── Backend Web Service (FastAPI) ──
  - type: web
    name: researchai-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # This prevents Render from putting your local API key in version control
      - key: GEMINI_API_KEY
        sync: false

  # ── Frontend Static Site (React/Vite) ──
  - type: static_site
    name: researchai-frontend
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: "20.x"
    routes:
      # Route all /api/* requests to the backend service
      - type: rewrite
        source: /api/*
        # IMPORTANT: Once deployed, replace this placeholder with your actual backend URL!
        destination: https://researchai-backend.onrender.com/api/*
      
      # Catch-all for React Router (SPA fallback)
      - type: rewrite
        source: /*
        destination: /index.html
